version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: water-iujo-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-super_secreto_en_produccion_cambiar}
      - DB_STORAGE=/usr/src/app/data/database.sqlite
    volumes:
      # Montamos un volumen para que la base de datos persista incluso si el contenedor se destruye
      - water_db_data:/usr/src/app/data

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: water-iujo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  water_db_data:
    name: water_iujo_db_volume
